name: Site Factory

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # If your Next.js app is in a subfolder, change this path.
      # Example: app folder is "site" or "app_src".
      - name: Install dependencies
        run: |
          cd app_src
          npm install

      - name: Build
        id: build
        run: |
          cd app_src
          npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # Optional, if your deploy script uses it:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd app_src
          npm i -g vercel
          # Option 1 (recommended): deploy via vercel.json + linked project
          vercel pull --yes --environment=production --token $VERCEL_TOKEN
          vercel build --prod --token $VERCEL_TOKEN
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token $VERCEL_TOKEN)

          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed to: $DEPLOY_URL"

      - name: Notify Worker
        if: env.DEPLOY_URL != ''
        env:
          WORKER_NOTIFY_URL: ${{ secrets.WORKER_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          REPO: ${{ github.repository }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
          # If you want, set CLIENT_SLUG as a repo variable or secret:
          CLIENT_SLUG: ${{ vars.CLIENT_SLUG }}
        run: |
          curl -X POST "$WORKER_NOTIFY_URL" \
            -H "content-type: application/json" \
            -d "{\"secret\":\"$NOTIFY_SECRET\",\"repo\":\"$REPO\",\"client\":\"$CLIENT_SLUG\",\"url\":\"$DEPLOY_URL\"}"
